<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تنبيه أمني خطير</title>
    <style>
        body { background-color: black; color: #00ff00; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; transition: background 0.1s; }
        #scary-ui { display: none; text-align: center; width: 100%; }
        .btn-cancel { padding: 25px 50px; font-size: 24px; background-color: red; color: white; border: none; cursor: pointer; border-radius: 15px; font-weight: bold; box-shadow: 0 0 20px red; }
        .flash-red { animation: blinker 0.1s linear infinite; }
        @keyframes blinker { 50% { background-color: red; color: black; } }
        .terminal-text { font-size: 18px; text-align: left; padding: 20px; display: inline-block; }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="trap-btn" class="btn-cancel" onclick="startPrank()">⚠️ تم اكتشاف نشاط مشبوه.. اضغط للإلغاء فوراً!</button>
    </div>

    <div id="scary-ui">
        <h1 id="status" style="font-size: 40px; color: red;">جاري اختراق الجهاز...</h1>
        <h2 id="progress" style="font-size: 60px;">0%</h2>
        <div class="terminal-text">
            <p>> Accessing Gallery... [OK]</p>
            <p>> Downloading WhatsApp Database... [WAIT]</p>
            <p>> Target: iPhone 14 Pro Max</p>
            <p id="log">> Sending data to remote server...</p>
        </div>
    </div>

    <script>
        function startPrank() {
            // تشغيل الصوت (تأكد إنك رفعت ملف اسمه horror.mp3)
            var audio = new Audio('horror.mp3');
            audio.play().catch(function(error) {
                console.log("Audio needs user interaction");
            });

            // إخفاء الكبسة وإظهار الرعب
            document.getElementById("start-screen").style.display = "none";
            document.getElementById("scary-ui").style.display = "block";
            document.body.classList.add("flash-red");

            // تحديث النسبة المئوية
            var count = 0;
            var interval = setInterval(function() {
                count += Math.floor(Math.random() * 7) + 1;
                if (count >= 100) {
                    count = 100;
                    document.getElementById("status").innerHTML = "تم سحب كافة البيانات بنجاح! 💀";
                    clearInterval(interval);
                }
                document.getElementById("progress").innerHTML = count + "%";
            }, 200);
        }
    </script>
</body>
</html>
